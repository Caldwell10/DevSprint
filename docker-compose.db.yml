version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: devsprint-db
    environment:
      POSTGRES_USER: devsprint
      POSTGRES_PASSWORD: devsprint
      POSTGRES_DB: devsprint_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devsprint -d devsprint_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - devsprint-db-data:/var/lib/postgresql/data

volumes:
  devsprint-db-data:
